name = "skillflux-mcp"
compatibility_date = "2026-06-24"
pages_build_output_dir = "./public"

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "skillflux"
database_id = "00000000-0000-0000-0000-000000000001"

[vars]
SITE_URL = "https://skillflux.cn"
SKILLFLUX_PRODUCT = "deluxe-pack"

# FREE PUBLIC BETA (this branch): any logged-in user unlocks all skills without
# payment. Login (GitHub OAuth) is still required, so beta users are real
# accounts. To start charging: set SKILLFLUX_FREE_BETA = "0" (or remove it),
# configure STRIPE_PRICE_MONTHLY / STRIPE_PRICE_ANNUAL, and deploy main.
SKILLFLUX_FREE_BETA = "1"

# IMPORTANT: do NOT set SKILLFLUX_FIXTURE_MODE here. Fixture mode is a
# development bypass that grants paid access without real SSO/payment. It is
# gated by both the flag AND a non-production host (see functions/lib/fixture.ts),
# so even if this flag leaked into production it would be refused on skillflux.cn.
# To enable it locally, put SKILLFLUX_FIXTURE_MODE = "1" in `.dev.vars`
# (git-ignored) or pass it to `wrangler pages dev`. Never enable it for the
# production deployment.

# Secrets (set via `wrangler secret put` in production):
# GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_MONTHLY, STRIPE_PRICE_ANNUAL  (recurring subscription Price ids)
# SKILLFLUX_API_DEV_TOKEN
