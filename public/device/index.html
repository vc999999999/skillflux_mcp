<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkillFlux 设备授权</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        line-height: 1.6;
        margin: 0;
        color: #111;
      }
      main {
        max-width: 42rem;
        margin: 4rem auto;
        padding: 0 1rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1.5rem;
      }
      .button {
        display: inline-block;
        padding: 0.6rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid #ccc;
        text-decoration: none;
        color: inherit;
      }
      .button.primary {
        background: #111;
        color: #fff;
        border-color: #111;
      }
      .ok { color: #067647; }
      .err { color: #b42318; }
      code {
        background: #f4f4f5;
        padding: 0.1rem 0.35rem;
        border-radius: 0.25rem;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script>
      const params = new URLSearchParams(location.search);
      const session = params.get("session");
      const code = params.get("code");
      const done = params.get("done");
      const error = params.get("error");
      const origin = location.origin;
      const app = document.getElementById("app");

      let html = "<h1>SkillFlux 设备授权</h1>";

      if (done) {
        html += '<p class="ok">登录完成。请回到你的 agent，再次运行 <code>auth.status</code>。</p>';
      } else if (error) {
        html += `<p class="err">授权失败：${error}</p>`;
      } else if (session && code) {
        html += `<p>设备码：<strong>${code}</strong></p>`;
        html += "<p>确认这是你发起的登录请求，然后选择登录方式：</p>";
        html += '<div class="actions">';
        html += `<a class="button primary" href="${origin}/api/auth/github/start?session=${encodeURIComponent(session)}">使用 GitHub 登录</a>`;
        html += `<a class="button" href="${origin}/api/auth/callback/fixture?session=${encodeURIComponent(session)}">Fixture 登录（开发）</a>`;
        html += "</div>";
      } else {
        html += "<p>缺少 session 参数。请从 agent 内的 SkillFlux 登录链接进入此页。</p>";
      }

      app.innerHTML = html;
    </script>
  </body>
</html>
